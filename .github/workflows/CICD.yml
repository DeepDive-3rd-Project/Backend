name: CICD

on:
  # main 브랜치로 push 또는 pull request 발생 시 실행
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ] 

permissions:
  contents: read

jobs:
  build:
    # Gradle 빌드 및 Docker 이미지 생성 작업
    runs-on: ubuntu-latest

    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout source code
        uses: actions/checkout@v3
        # GitHub 레포지토리에서 소스 코드를 가져옴.

      # 2. JDK 21 설치
      - name: Install JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
        # 빌드에 필요한 Java Development Kit(JDK)를 설치.

      # 3. Gradle 설정
      - name: Set up Gradle
        uses: gradle/gradle-build-action@v2
        # Gradle 실행 환경 구성.

      # Gradle 의존성 캐싱 설정 
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      #매번 의존성 다운로드 발생을 막아서 빌드 시간을 줄여줌.

      # 4. Gradle 빌드 실행 (멀티모듈)
      - name: Build with Gradle (Multimodule)
        run: |
          chmod +x ./gradlew
          ./gradlew clean build --parallel --build-cache -x test
        # 프로젝트를 Gradle로 빌드. 테스트는 제외하고 실행. (--parallel, --build-cache 사용으로 시간 줄이기)

      # 5. Docker 이미지 태그 설정
      - name: Set Docker Image Tag
        run: echo "IMAGE_TAG=${{ github.sha }}" >> $GITHUB_ENV
        # Docker 이미지에 고유 태그를 부여.

      # 6. DockerHub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        # DockerHub에 로그인하여 이미지를 푸시할 수 있도록 인증.

  deploy:
    # 배포 작업 (build 작업 완료 후 실행)
    needs: build
    runs-on: ubuntu-latest

    steps:
      # 1. 현재 배포 상태 확인 및 타겟 업스트림 설정
      - name: Set target IP and upstream
        run: |
          if curl -o /dev/null -s -w "%{http_code}" "http://${{ secrets.LIVE_SERVER_IP }}/env" | grep 200; then
            CURRENT_UPSTREAM=$(curl -s "http://${{ secrets.LIVE_SERVER_IP }}/env")
          else
            CURRENT_UPSTREAM=green
          fi

          TARGET_UPSTREAM=$([ "$CURRENT_UPSTREAM" == "blue" ] && echo "green" || echo "blue")
          echo "TARGET_UPSTREAM=$TARGET_UPSTREAM" >> $GITHUB_ENV
        # 현재 활성화된 Nginx 업스트림(blue/green)을 확인하고, 새로운 배포 대상 설정.
          
      # 2. EC2에 환경 변수 파일 생성
      - name: Create .env file on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIVE_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/deploy
            cat <<EOF > /home/ubuntu/deploy/.env
            DB_HOST=${{ secrets.POSTGRES_HOST }}
            DB_PORT=5432
            DB_NAME=${{ secrets.POSTGRES_DB }}
            DB_USERNAME=${{ secrets.POSTGRES_USER }}
            DB_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            EOF
        # EC2 서버에 환경 변수 파일을 생성.

      # 3. 새로운 컨테이너 배포 (멀티모듈)
      - name: Deploy new containers (Multimodule)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIVE_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Deploying to ${{ env.TARGET_UPSTREAM }}"
            cd /home/ubuntu/deploy

            if [ ! -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml ]; then
              echo "🚨 Error: docker-compose-${{ env.TARGET_UPSTREAM }}.yml not found!"
              exit 1
            fi

            sudo docker-compose -f docker-compose-${{ env.TARGET_UPSTREAM }}.yml --env-file .env up -d \
              --build --no-deps --remove-orphans
        # team1-api, team1-domain, team1-infra 컨테이너를 함께 실행.

      # 4. 새로운 배포의 Health Check
      - name: Health check on new deployment
        uses: jtalk/url-health-check-action@v3
        with:
          url: http://${{ secrets.LIVE_SERVER_IP }}:8080/swagger-ui/index.html #8080 적용
          max-attempts: 5
          retry-delay: 5s
        # 새로운 컨테이너가 정상적으로 실행되는지 확인.

      # 5. Nginx 업스트림 업데이트
      - name: Update Nginx upstream
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIVE_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Switching Nginx upstream to ${{ env.TARGET_UPSTREAM }}"
            sudo docker exec -i nginx-server bash -c '
              cp /etc/nginx/conf.d/service-env.inc /etc/nginx/conf.d/service-env.inc.bak &&
              echo "set \$service_url ${{ env.TARGET_UPSTREAM }};" > /etc/nginx/conf.d/service-env.inc &&
              nginx -t && nginx -s reload
            '
        # Nginx 설정을 업데이트하여 새로운 업스트림 활성화.

      # 6. 이전 컨테이너 정리
      - name: Stop previous container
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LIVE_SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            PREV_CONTAINER_ID=$(sudo docker ps -q --filter "name=team1-api-${{ env.CURRENT_UPSTREAM }}")
            if [ -n "$PREV_CONTAINER_ID" ]; then
              echo "Stopping old container: ${{ env.CURRENT_UPSTREAM }}"
              sudo docker stop $PREV_CONTAINER_ID
              sudo docker rm $PREV_CONTAINER_ID
            else
              echo "No previous container found. Skipping cleanup."
            fi
        # 이전 컨테이너를 종료하고 삭제하여 리소스 정리.
