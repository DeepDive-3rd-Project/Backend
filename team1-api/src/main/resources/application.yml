spring:
  application:
    name: team1

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:team1}?reWriteBatchedInserts=true&preferQueryMode=simple
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.postgresql.Driver

  jpa:
    defer-datasource-initialization: true
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate
        default_batch_fetch_size: 10000
        order_inserts: true
        order_updates: true
        jdbc:
          time_zone: Asia/Seoul
